name: Daily Korean AI Briefing

on:
  schedule:
    # 매일 한국 시간 오전 8시
    # GitHub cron 기본 시간대는 UTC이므로 23:00 UTC로 설정
    - cron: "0 23 * * *"

  # Actions 화면에서 직접 테스트 실행
  workflow_dispatch:

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub config
        run: cp data/config.github.json data/config.json

      - name: Generate Horizon briefing
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: uv run python -m src.main --hours 24

      - name: Translate and send to Telegram
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python scripts/translate_and_deliver.py
